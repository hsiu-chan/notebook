name: Build Jekyll + Auto-generate Index
env:
  GH_TOKEN: ${{ secrets.PAT_TOKEN }}

on:
  push:
    branches: ["main"]
    # 避免 github-actions 自己 commit 的 index.html 再次觸發部署迴圈
    paths-ignore:
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write   # 需要 write 權限 commit 回 repo
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true # 如果有新的 push，自動取消進行中的舊部署，省時間

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository (加入淺層複製，只抓最新一筆，速度極快)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ Setup Ruby + Bundler (已經內建快取，不需要額外 bundle install)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          bundler: '2.4.22'

      # 3️⃣ Setup Python (加入 pip 快取機制)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: 'pip'

      # 4️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: pip install PyGithub jinja2

      # 5️⃣ Generate index.html in repo root
      - name: Generate index.html
        run: python scripts/generate_index.py

      # 6️⃣ Commit generated index.html back to repo only if changed
      - name: Commit index.html if changed
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-generate index.html [skip ci]" 
            # 加上 [skip ci] 雙重保險，告訴 GitHub 不要再次觸發 Actions
            git push https://${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
            echo "✅ index.html committed and pushed."
          else
            echo "ℹ️ No changes in index.html. Nothing to commit."
          fi

      # 7️⃣ Build Jekyll site
      - name: Build Jekyll site
        run: bundle exec jekyll build --destination ./_site

      # 8️⃣ Upload Pages artifact
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      # 9️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
